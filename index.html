<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Cantinho de Estudos · Flashcards</title>

<style>
:root {
    --bg-primary: #26241E;
    --bg-secondary: #594A3C;
    --accent: #A67153;
    --text-primary: #F2E6D8;
    --text-secondary: #F2E6D8;
    --card-bg: #F2E6D8;
    --shadow: rgba(38, 36, 30, 0.15);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: var(--bg-primary);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    position: relative;
}

html {
    height: -webkit-fill-available;
}

.container {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    min-height: 95vh;
}

/* Telas */
.screen {
    display: none;
    flex-direction: column;
    height: 100%;
}

.screen.active {
    display: flex;
}

/* Header */
.header {
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
}

.header h1 {
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    opacity: 0.7;
}

/* Home Screen */
.welcome-message {
    background: var(--bg-secondary);
    border-radius: 28px;
    padding: 32px 24px;
    margin-bottom: 32px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
    border: 1px solid rgba(242, 230, 216, 0.1);
}

.welcome-message h2 {
    color: var(--text-primary);
    font-size: 1.6rem;
    font-weight: 400;
    line-height: 1.4;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
}

.welcome-message p {
    color: var(--text-primary);
    font-size: 1rem;
    opacity: 0.7;
    font-weight: 300;
    line-height: 1.6;
}

/* Lista de Temas */
.topics-title {
    color: var(--text-secondary);
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    padding: 0 4px;
    opacity: 0.5;
    text-transform: uppercase;
}

.topics-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
}

.topic-card {
    background: rgba(242, 230, 216, 0.03);
    border: 1px solid rgba(242, 230, 216, 0.08);
    border-radius: 24px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 16px;
}

.topic-card:active {
    background: rgba(242, 230, 216, 0.06);
    transform: scale(0.99);
    border-color: var(--accent);
}

.topic-icon {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    opacity: 0.9;
}

.topic-info {
    flex: 1;
}

.topic-name {
    color: var(--text-primary);
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 4px;
}

.topic-meta {
    color: var(--text-secondary);
    font-size: 0.8rem;
    opacity: 0.5;
    display: flex;
    gap: 12px;
}

.topic-description {
    color: var(--text-secondary);
    font-size: 0.75rem;
    opacity: 0.4;
    margin-top: 6px;
    line-height: 1.4;
}

/* Header do Estudo */
.study-header {
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
}

.back-button {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 0.9rem;
    padding: 8px 12px;
    border-radius: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.7;
    transition: opacity 0.2s;
    border: 1px solid rgba(242, 230, 216, 0.1);
}

.back-button:active {
    opacity: 1;
    background: rgba(242, 230, 216, 0.05);
}

.current-topic {
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 400;
    opacity: 0.5;
    letter-spacing: 0.3px;
}

/* Card principal */
.card-container {
    perspective: 1500px;
    margin-bottom: 16px;
    flex: 1;
    min-height: 0;
}

.card {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 320px;
    max-height: 420px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
}

.card.flipped {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 28px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 28px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
}

.card-front {
    background: var(--card-bg);
    color: var(--bg-primary);
}

.card-front h2 {
    font-size: 1.6rem;
    font-weight: 500;
    text-align: center;
    line-height: 1.4;
    letter-spacing: -0.01em;
    color: var(--bg-primary);
    max-width: 90%;
}

.card-back {
    background: var(--bg-secondary);
    color: var(--text-primary);
    transform: rotateY(180deg);
}

.card-back h3 {
    font-size: 2rem;
    font-weight: 500;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
    color: var(--text-primary);
}

.card-back small {
    font-size: 1rem;
    line-height: 1.5;
    opacity: 0.8;
    max-width: 90%;
    text-align: center;
    font-weight: 300;
    color: var(--text-primary);
}

/* Hint */
.flip-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-secondary);
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0.3;
    transition: opacity 0.2s;
    letter-spacing: 0.3px;
}

/* Controles */
.controls-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 24px;
}

.btn {
    padding: 12px 0;
    border: none;
    border-radius: 40px;
    font-weight: 400;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid rgba(242, 230, 216, 0.1);
    letter-spacing: 0.3px;
}

.btn:active {
    background: rgba(242, 230, 216, 0.05);
    transform: scale(0.97);
    border-color: var(--accent);
    color: var(--accent);
}

/* Progresso */
.progress-section {
    margin-top: auto;
    padding: 8px 4px 0;
}

.progress-bar-container {
    width: 100%;
    height: 2px;
    background: rgba(242, 230, 216, 0.1);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 12px;
}

.progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
    opacity: 0.7;
}

/* Miniaturas */
.thumbnails-wrapper {
    width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 4px 0;
    opacity: 0.5;
    transition: opacity 0.2s;
}

.thumbnails-wrapper:active {
    opacity: 0.8;
}

.thumbnails-wrapper::-webkit-scrollbar {
    display: none;
}

.card-thumbnails {
    display: flex;
    gap: 6px;
    padding: 2px;
    min-width: min-content;
    justify-content: center;
}

.thumbnail {
    width: 28px;
    height: 28px;
    border-radius: 30px;
    background: transparent;
    border: 1px solid rgba(242, 230, 216, 0.2);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-weight: 300;
    font-size: 0.7rem;
    flex-shrink: 0;
    opacity: 0.5;
}

.thumbnail:active {
    transform: scale(0.9);
    border-color: var(--accent);
    opacity: 1;
}

.thumbnail.active {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--text-primary);
    opacity: 1;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-primary);
    color: var(--text-secondary);
    padding: 10px 24px;
    border-radius: 40px;
    font-weight: 300;
    font-size: 0.85rem;
    z-index: 1000;
    transition: transform 0.3s ease;
    border: 1px solid rgba(242, 230, 216, 0.1);
    text-align: center;
    letter-spacing: 0.3px;
    backdrop-filter: blur(10px);
}

.toast.show {
    transform: translateX(-50%) translateY(0);
}

/* Loading */
.loading {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--card-bg);
    border-radius: 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.loading-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid rgba(38, 36, 30, 0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    transition: opacity 0.3s ease;
}

.loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

.loading-content {
    text-align: center;
    color: var(--text-secondary);
}

.loading-spinner-large {
    width: 40px;
    height: 40px;
    border: 2px solid rgba(242, 230, 216, 0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
}

.loading-content p {
    font-size: 0.9rem;
    opacity: 0.5;
    font-weight: 300;
    letter-spacing: 0.5px;
}

/* Responsivo */
@media (max-width: 380px) {
    .card {
        min-height: 280px;
    }
    
    .card-front h2 {
        font-size: 1.4rem;
    }
    
    .card-back h3 {
        font-size: 1.6rem;
    }
    
    .welcome-message h2 {
        font-size: 1.4rem;
    }
}

/* Acessibilidade */
@media (prefers-reduced-motion: reduce) {
    * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
        <div class="loading-spinner-large"></div>
        <p>carregando seus flashcards...</p>
    </div>
</div>

<div class="container">
    <!-- Tela Inicial (Home) -->
    <div id="homeScreen" class="screen active">
        <div class="header">
            <h1>cantinho de estudos</h1>
            <div class="stats">
                <div class="stat-item">
                    <span id="totalTopics">0</span> temas
                </div>
            </div>
        </div>

        <div class="welcome-message">
            <h2>Seja bem vindo(a) ao seu cantinho de estudos rápidos!!</h2>
            <p>O que deseja rever hoje?</p>
        </div>

        <div class="topics-title">temas disponíveis</div>
        <div class="topics-grid" id="topicsList">
            <!-- Temas serão inseridos aqui via JavaScript -->
        </div>
    </div>

    <!-- Tela de Estudo -->
    <div id="studyScreen" class="screen">
        <div class="study-header">
            <button class="back-button" onclick="goHome()">
                <span>←</span> voltar
            </button>
            <span class="current-topic" id="currentTopic"></span>
        </div>

        <!-- Card principal -->
        <div class="card-container">
            <div class="card" id="mainCard" onclick="flipCard()" role="button" tabindex="0">
                <div class="card-face card-front">
                    <h2 id="pergunta">Carregando...</h2>
                    <div class="flip-hint">
                        <span>toque para revelar</span>
                    </div>
                </div>
                <div class="card-face card-back">
                    <h3 id="resposta"></h3>
                    <small id="explicacao"></small>
                    <div class="flip-hint">
                        <span>toque para voltar</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controles -->
        <div class="controls-grid">
            <button class="btn" onclick="prevCard()">← anterior</button>
            <button class="btn" onclick="nextCard()">próximo →</button>
            <button class="btn" onclick="shuffleCards()">aleatório</button>
            <button class="btn" onclick="resetOrder()">reiniciar</button>
        </div>

        <!-- Progresso -->
        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress" style="width: 0%;"></div>
            </div>
            
            <div class="thumbnails-wrapper">
                <div class="card-thumbnails" id="thumbnails"></div>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let studyTopics = {};
let currentTopic = null;
let flashcards = [];
let originalCards = [];
let currentIndex = 0;
let studyTime = 0;
let timerInterval;
let touchStartX = 0;

// Elementos DOM
const loadingOverlay = document.getElementById('loadingOverlay');
const homeScreen = document.getElementById('homeScreen');
const studyScreen = document.getElementById('studyScreen');
const topicsList = document.getElementById('topicsList');
const totalTopicsEl = document.getElementById('totalTopics');
const currentTopicEl = document.getElementById('currentTopic');
const cardElement = document.getElementById('mainCard');
const perguntaEl = document.getElementById('pergunta');
const respostaEl = document.getElementById('resposta');
const explicacaoEl = document.getElementById('explicacao');
const progressEl = document.getElementById('progress');
const counterEl = document.getElementById('studyProgress');
const thumbnailsEl = document.getElementById('thumbnails');
const toastEl = document.getElementById('toast');
const studyTimeEl = document.getElementById('studyTime');

// Carregar dados do JSON
fetch('flashcards.json')
    .then(response => {
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
    })
    .then(data => {
        studyTopics = data;
        initializeApp();
        loadingOverlay.classList.add('hidden');
        showToast('✨ flashcards carregados!');
    })
    .catch(error => {
        console.error('Erro ao carregar flashcards:', error);
        loadingOverlay.classList.add('hidden');
        showToast('❌ Erro ao carregar dados', 3000);
        
        // Dados de emergência para não quebrar a interface
        studyTopics = {
            "exemplo": {
                name: "Modo de Exemplo",
                icon: "⚠️",
                description: "Arquivo flashcards.json não encontrado",
                flashcards: [
                    {
                        pergunta: "Arquivo não encontrado",
                        resposta: "flashcards.json",
                        explicacao: "Certifique-se que o arquivo está na mesma pasta do HTML"
                    },
                    {
                        pergunta: "Formato esperado",
                        resposta: "JSON válido",
                        explicacao: "Cada tema deve ter name, icon e flashcards array"
                    }
                ]
            }
        };
        initializeApp();
    });

function initializeApp() {
    renderTopics();
    totalTopicsEl.textContent = Object.keys(studyTopics).length;
}

function renderTopics() {
    topicsList.innerHTML = '';
    
    for (const [key, topic] of Object.entries(studyTopics)) {
        const topicCard = document.createElement('div');
        topicCard.className = 'topic-card';
        topicCard.onclick = () => selectTopic(key);
        
        topicCard.innerHTML = `
            <div class="topic-icon">${topic.icon || '📌'}</div>
            <div class="topic-info">
                <div class="topic-name">${topic.name}</div>
                <div class="topic-meta">
                    <span>📚 ${topic.flashcards?.length || 0} cards</span>
                </div>
                ${topic.description ? `<div class="topic-description">${topic.description}</div>` : ''}
            </div>
        `;
        
        topicsList.appendChild(topicCard);
    }
}

function selectTopic(topicKey) {
    currentTopic = studyTopics[topicKey];
    flashcards = [...(currentTopic.flashcards || [])];
    originalCards = [...(currentTopic.flashcards || [])];
    currentIndex = 0;
    
    currentTopicEl.textContent = currentTopic.name;
    
    // Trocar para tela de estudo
    homeScreen.classList.remove('active');
    studyScreen.classList.add('active');
    
    if (flashcards.length > 0) {
        loadCard();
    } else {
        showToast('📭 Tema sem flashcards', 2000);
    }
    startTimer();
    showToast(`📖 ${currentTopic.name}`);
}

function goHome() {
    studyScreen.classList.remove('active');
    homeScreen.classList.add('active');
    stopTimer();
    studyTime = 0;
    if (studyTimeEl) {
        studyTimeEl.textContent = '00:00';
    }
}

function startTimer() {
    stopTimer();
    timerInterval = setInterval(() => {
        studyTime++;
        const minutes = Math.floor(studyTime / 60);
        const seconds = studyTime % 60;
        if (studyTimeEl) {
            studyTimeEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    }, 1000);
}

function stopTimer() {
    if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

function loadCard() {
    if (!flashcards || !flashcards.length) return;
    
    const card = flashcards[currentIndex];
    
    perguntaEl.innerText = card.pergunta;
    respostaEl.innerText = card.resposta;
    explicacaoEl.innerText = card.explicacao;
    
    cardElement.classList.remove('flipped');
    
    updateProgress();
    updateThumbnails();
}

function updateThumbnails() {
    thumbnailsEl.innerHTML = '';
    flashcards.forEach((_, index) => {
        const thumb = document.createElement('div');
        thumb.className = `thumbnail ${index === currentIndex ? 'active' : ''}`;
        thumb.textContent = index + 1;
        thumb.setAttribute('data-index', index);
        thumb.addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = index;
            loadCard();
        });
        thumbnailsEl.appendChild(thumb);
    });
    
    setTimeout(() => {
        const activeThumb = document.querySelector('.thumbnail.active');
        if (activeThumb) {
            activeThumb.scrollIntoView({
                behavior: 'smooth',
                block: 'nearest',
                inline: 'center'
            });
        }
    }, 100);
}

function updateProgress() {
    if (counterEl) {
        counterEl.textContent = `${currentIndex + 1}/${flashcards.length}`;
    }
    const progressValue = ((currentIndex + 1) / flashcards.length) * 100;
    progressEl.style.width = `${progressValue}%`;
}

function flipCard() {
    cardElement.classList.toggle('flipped');
}

function nextCard() {
    if (currentIndex < flashcards.length - 1) {
        currentIndex++;
        loadCard();
        showToast(`${currentIndex + 1}/${flashcards.length}`);
    } else {
        showToast('🎉 final do tema!');
    }
}

function prevCard() {
    if (currentIndex > 0) {
        currentIndex--;
        loadCard();
        showToast(`${currentIndex + 1}/${flashcards.length}`);
    }
}

function shuffleCards() {
    for (let i = flashcards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
    }
    currentIndex = 0;
    loadCard();
    showToast('🎲 modo aleatório');
}

function resetOrder() {
    flashcards = [...originalCards];
    currentIndex = 0;
    loadCard();
    showToast('🔄 ordem original');
}

function showToast(message, duration = 1500) {
    toastEl.textContent = message;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), duration);
}

// Touch gestures
cardElement.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
}, { passive: true });

cardElement.addEventListener('touchend', (e) => {
    const touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
        diff > 0 ? nextCard() : prevCard();
    }
}, { passive: true });

// Keyboard navigation
document.addEventListener('keydown', (e) => {
    if (!studyScreen.classList.contains('active')) return;
    
    if (e.key === 'ArrowLeft') { 
        e.preventDefault(); 
        prevCard(); 
    }
    else if (e.key === 'ArrowRight') { 
        e.preventDefault(); 
        nextCard(); 
    }
    else if (e.key === ' ') { 
        e.preventDefault(); 
        flipCard(); 
    }
});

// Cleanup
window.addEventListener('beforeunload', () => stopTimer());
</script>
</body>
</html>
