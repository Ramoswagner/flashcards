<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flashcards · Figuras de Linguagem</title>

<style>
:root {
    --bg-primary: #26241E;
    --bg-secondary: #594A3C;
    --accent: #A67153;
    --text-primary: #F2E6D8;
    --text-secondary: #615F6D;
    --card-bg: #F2E6D8;
    --shadow: rgba(38, 36, 30, 0.15);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: var(--bg-primary);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    position: relative;
}

html {
    height: -webkit-fill-available;
}

.container {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    height: 100%;
    max-height: 95vh;
}

/* Header minimalista */
.header {
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
}

.header h1 {
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    opacity: 0.7;
}

.stats {
    display: flex;
    gap: 12px;
    color: var(--text-secondary);
    font-size: 0.85rem;
    font-weight: 400;
}

.stat-item {
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0.7;
}

/* Card principal - elegante e limpo */
.card-container {
    perspective: 1500px;
    margin-bottom: 16px;
    flex: 1;
    min-height: 0;
}

.card {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 320px;
    max-height: 420px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
}

.card.flipped {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 28px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 28px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
    transition: box-shadow 0.3s ease;
}

.card-front {
    background: var(--card-bg);
    color: var(--bg-primary);
}

.card-front h2 {
    font-size: 1.6rem;
    font-weight: 500;
    text-align: center;
    line-height: 1.4;
    letter-spacing: -0.01em;
    color: var(--bg-primary);
    max-width: 90%;
}

.card-back {
    background: var(--bg-secondary);
    color: var(--text-primary);
    transform: rotateY(180deg);
}

.card-back h3 {
    font-size: 2rem;
    font-weight: 500;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
    color: var(--text-primary);
}

.card-back small {
    font-size: 1rem;
    line-height: 1.5;
    opacity: 0.8;
    max-width: 90%;
    text-align: center;
    font-weight: 300;
    color: var(--text-primary);
}

/* Hint minimalista */
.flip-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-secondary);
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0.3;
    transition: opacity 0.2s ease;
    letter-spacing: 0.3px;
}

.card:hover .flip-hint {
    opacity: 0.5;
}

/* Controles sutis */
.controls-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 24px;
}

.btn {
    padding: 12px 0;
    border: none;
    border-radius: 40px;
    font-weight: 400;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid rgba(97, 95, 109, 0.2);
    backdrop-filter: blur(5px);
    letter-spacing: 0.3px;
}

.btn:active {
    background: rgba(97, 95, 109, 0.1);
    transform: scale(0.97);
    border-color: var(--accent);
    color: var(--accent);
}

/* Progresso - discreto e abaixo */
.progress-section {
    margin-top: auto;
    padding: 8px 4px 0;
}

.progress-header {
    display: none; /* Totalmente discreto */
}

/* Barra de progresso ultrafina */
.progress-bar-container {
    width: 100%;
    height: 2px;
    background: rgba(97, 95, 109, 0.15);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 12px;
}

.progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
    opacity: 0.7;
}

/* Miniaturas sutis */
.thumbnails-wrapper {
    width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding: 4px 0;
    opacity: 0.5;
    transition: opacity 0.2s ease;
}

.thumbnails-wrapper:hover,
.thumbnails-wrapper:active {
    opacity: 0.8;
}

.thumbnails-wrapper::-webkit-scrollbar {
    display: none;
}

.card-thumbnails {
    display: flex;
    gap: 6px;
    padding: 2px 2px;
    min-width: min-content;
    justify-content: center;
}

.thumbnail {
    width: 28px;
    height: 28px;
    border-radius: 30px;
    background: transparent;
    border: 1px solid rgba(97, 95, 109, 0.3);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-weight: 300;
    font-size: 0.7rem;
    flex-shrink: 0;
    opacity: 0.5;
}

.thumbnail:active {
    transform: scale(0.9);
    border-color: var(--accent);
    opacity: 1;
}

.thumbnail.active {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--text-primary);
    opacity: 1;
    border-width: 1px;
}

/* Toast elegante */
.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-primary);
    color: var(--text-secondary);
    padding: 10px 24px;
    border-radius: 40px;
    font-weight: 300;
    font-size: 0.85rem;
    z-index: 1000;
    transition: transform 0.3s ease;
    border: 1px solid rgba(97, 95, 109, 0.2);
    text-align: center;
    letter-spacing: 0.3px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.toast.show {
    transform: translateX(-50%) translateY(0);
}

/* Loading minimalista */
.loading {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--card-bg);
    border-radius: 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.loading-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid rgba(38, 36, 30, 0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Ajustes responsivos */
@media (max-width: 380px) {
    .card {
        min-height: 280px;
    }
    
    .card-front h2 {
        font-size: 1.4rem;
    }
    
    .card-back h3 {
        font-size: 1.6rem;
    }
    
    .card-back small {
        font-size: 0.9rem;
    }
    
    .btn {
        padding: 10px 0;
        font-size: 0.8rem;
    }
}

/* Prevenção de zoom */
input, textarea, select, button {
    font-size: 16px;
}

/* Acessibilidade */
@media (prefers-reduced-motion: reduce) {
    * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}

.btn:focus-visible,
.thumbnail:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
}
</style>
</head>
<body>

<div class="container">
    <!-- Header minimalista -->
    <div class="header">
        <h1>figuras de linguagem</h1>
        <div class="stats">
            <div class="stat-item">
                <span id="studyProgress">0/0</span>
            </div>
            <div class="stat-item">
                <span id="studyTime">00:00</span>
            </div>
        </div>
    </div>

    <!-- Card principal -->
    <div class="card-container">
        <div class="card" id="mainCard" onclick="flipCard()" role="button" tabindex="0">
            <div class="card-face card-front">
                <h2 id="pergunta">Carregando...</h2>
                <div class="flip-hint">
                    <span>toque para revelar</span>
                </div>
            </div>
            <div class="card-face card-back">
                <h3 id="resposta"></h3>
                <small id="explicacao"></small>
                <div class="flip-hint">
                    <span>toque para voltar</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Controles -->
    <div class="controls-grid">
        <button class="btn" onclick="prevCard()">← anterior</button>
        <button class="btn" onclick="nextCard()">próximo →</button>
        <button class="btn" onclick="shuffleCards()">aleatório</button>
        <button class="btn" onclick="resetOrder()">reiniciar</button>
    </div>

    <!-- Progresso discreto -->
    <div class="progress-section">
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress" style="width: 0%;"></div>
        </div>
        
        <div class="thumbnails-wrapper">
            <div class="card-thumbnails" id="thumbnails"></div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let flashcards = [];
let originalCards = [];
let currentIndex = 0;
let studyTime = 0;
let timerInterval;
let isLoading = true;
let touchStartX = 0;
let touchEndX = 0;

// Elementos DOM
const cardElement = document.getElementById('mainCard');
const perguntaEl = document.getElementById('pergunta');
const respostaEl = document.getElementById('resposta');
const explicacaoEl = document.getElementById('explicacao');
const progressEl = document.getElementById('progress');
const counterEl = document.getElementById('studyProgress');
const thumbnailsEl = document.getElementById('thumbnails');
const toastEl = document.getElementById('toast');
const studyTimeEl = document.getElementById('studyTime');

// Carregar dados
fetch("flashcards.json")
.then(response => response.json())
.then(data => {
    flashcards = data;
    originalCards = [...data];
    isLoading = false;
    loadCard();
    startTimer();
    showToast('pronto');
})
.catch(() => {
    // Dados de exemplo silenciosos
    flashcards = [
        { pergunta: "O que é Metáfora?", resposta: "Metáfora", explicacao: "Comparação implícita." },
        { pergunta: "O que é Ironia?", resposta: "Ironia", explicacao: "Dizer o oposto do que se quer." },
        { pergunta: "O que é Hipérbole?", resposta: "Hipérbole", explicacao: "Exagero expressivo." }
    ];
    originalCards = [...flashcards];
    isLoading = false;
    loadCard();
    startTimer();
});

function startTimer() {
    timerInterval = setInterval(() => {
        studyTime++;
        const minutes = Math.floor(studyTime / 60);
        const seconds = studyTime % 60;
        studyTimeEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }, 1000);
}

function loadCard() {
    if (isLoading || !flashcards.length) return;
    
    const card = flashcards[currentIndex];
    
    perguntaEl.innerText = card.pergunta;
    respostaEl.innerText = card.resposta;
    explicacaoEl.innerText = card.explicacao;
    
    cardElement.classList.remove('flipped');
    
    updateProgress();
    updateThumbnails();
}

function updateThumbnails() {
    thumbnailsEl.innerHTML = '';
    flashcards.forEach((_, index) => {
        const thumb = document.createElement('div');
        thumb.className = `thumbnail ${index === currentIndex ? 'active' : ''}`;
        thumb.textContent = index + 1;
        thumb.setAttribute('data-index', index);
        thumb.addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = index;
            loadCard();
        });
        thumbnailsEl.appendChild(thumb);
    });
    
    setTimeout(() => {
        const activeThumb = document.querySelector('.thumbnail.active');
        if (activeThumb) {
            activeThumb.scrollIntoView({
                behavior: 'smooth',
                block: 'nearest',
                inline: 'center'
            });
        }
    }, 100);
}

function updateProgress() {
    counterEl.textContent = `${currentIndex + 1}/${flashcards.length}`;
    const progressValue = ((currentIndex + 1) / flashcards.length) * 100;
    progressEl.style.width = `${progressValue}%`;
}

function flipCard() {
    if (isLoading) return;
    cardElement.classList.toggle('flipped');
}

function nextCard() {
    if (isLoading) return;
    if (currentIndex < flashcards.length - 1) {
        currentIndex++;
        loadCard();
        showToast(`${currentIndex + 1}/${flashcards.length}`);
    }
}

function prevCard() {
    if (isLoading) return;
    if (currentIndex > 0) {
        currentIndex--;
        loadCard();
        showToast(`${currentIndex + 1}/${flashcards.length}`);
    }
}

function shuffleCards() {
    if (isLoading) return;
    
    for (let i = flashcards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
    }
    currentIndex = 0;
    loadCard();
    showToast('aleatório');
}

function resetOrder() {
    if (isLoading) return;
    
    flashcards = [...originalCards];
    currentIndex = 0;
    loadCard();
    showToast('reiniciado');
}

function showToast(message, duration = 1500) {
    toastEl.textContent = message;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), duration);
}

// Touch gestures
cardElement.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
}, { passive: true });

cardElement.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
        diff > 0 ? nextCard() : prevCard();
    }
}, { passive: true });

// Keyboard
document.addEventListener('keydown', (e) => {
    if (isLoading) return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevCard(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); nextCard(); }
    else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

window.addEventListener('beforeunload', () => clearInterval(timerInterval));
</script>
</body>
</html>
