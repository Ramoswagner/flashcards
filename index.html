<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards - Figuras de Linguagem</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

/* CONTAINER */
.container {
    width: 90%;
    max-width: 650px;
    text-align: center;
}

/* TÍTULO */
h1 {
    margin-bottom: 25px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* CARD */
.card {
    perspective: 1200px;
    margin-bottom: 20px;
}

.card-inner {
    position: relative;
    width: 100%;
    height: 320px;
    transition: transform 0.8s cubic-bezier(.4,.2,.2,1);
    transform-style: preserve-3d;
    cursor: pointer;
}

.card.flip .card-inner {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    padding: 35px;
    border-radius: 25px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.35);
}

.card-front {
    background: white;
    color: #333;
}

.card-back {
    background: #f5f7fa;
    color: #222;
    transform: rotateY(180deg);
}

.card-front h2 {
    font-size: 20px;
    line-height: 1.5;
}

.card-back h3 {
    font-size: 22px;
    margin-bottom: 12px;
    color: #1e3c72;
}

.card-back small {
    font-size: 14px;
    opacity: 0.85;
    line-height: 1.4;
}

/* BOTÕES */
.controls {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.btn-prev { background: #444; color: white; }
.btn-next { background: #00c896; color: white; }
.btn-random { background: #ffb703; color: #000; }
.btn-reset { background: #d62828; color: white; }

/* PROGRESSO */
.progress-bar {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    margin-top: 20px;
    overflow: hidden;
}

.progress {
    height: 100%;
    background: #00ffcc;
    width: 0%;
    transition: width 0.4s ease;
}

/* CONTADOR */
.counter {
    margin-top: 12px;
    font-size: 14px;
    opacity: 0.9;
}

/* RESPONSIVO */
@media (max-width: 500px) {
    .card-inner { height: 280px; }
    .card-front h2 { font-size: 18px; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Flashcards - Figuras de Linguagem</h1>

    <div class="card" onclick="flipCard()">
        <div class="card-inner">
            <div class="card-front">
                <h2 id="pergunta">Carregando...</h2>
            </div>
            <div class="card-back">
                <h3 id="resposta"></h3>
                <small id="explicacao"></small>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-prev" onclick="prevCard()">Anterior</button>
        <button class="btn-next" onclick="nextCard()">Próximo</button>
    </div>

    <div class="controls">
        <button class="btn-random" onclick="shuffleCards()">Modo Aleatório</button>
        <button class="btn-reset" onclick="resetOrder()">Reiniciar Ordem</button>
    </div>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="counter" id="counter"></div>
</div>

<script>
let flashcards = [];
let originalCards = [];
let currentIndex = 0;

fetch("flashcards.json")
.then(response => response.json())
.then(data => {
    flashcards = data;
    originalCards = [...data];
    loadCard();
});

function loadCard() {
    const card = flashcards[currentIndex];

    document.getElementById("pergunta").innerText = card.pergunta;
    document.getElementById("resposta").innerText = card.resposta;
    document.getElementById("explicacao").innerText = card.explicacao;

    document.querySelector(".card").classList.remove("flip");

    updateProgress();
}

function flipCard() {
    document.querySelector(".card").classList.toggle("flip");
}

function nextCard() {
    if (currentIndex < flashcards.length - 1) {
        currentIndex++;
        loadCard();
    }
}

function prevCard() {
    if (currentIndex > 0) {
        currentIndex--;
        loadCard();
    }
}

function shuffleCards() {
    for (let i = flashcards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
    }
    currentIndex = 0;
    loadCard();
}

function resetOrder() {
    flashcards = [...originalCards];
    currentIndex = 0;
    loadCard();
}

function updateProgress() {
    const progress = ((currentIndex + 1) / flashcards.length) * 100;
    document.getElementById("progress").style.width = progress + "%";
    document.getElementById("counter").innerText =
        `Questão ${currentIndex + 1} de ${flashcards.length}`;
}
</script>

</body>
</html>
