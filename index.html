<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashCards Pro - Figuras de Linguagem</title>

<style>
:root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --secondary: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    --dark: #1f2937;
    --light: #f9fafb;
    --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
}

body {
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
    position: relative;
    overflow-x: hidden;
}

/* Background Animation */
body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
    animation: pulse 8s ease-in-out infinite;
    pointer-events: none;
}

@keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.6; }
}

.container {
    width: 100%;
    max-width: 700px;
    position: relative;
    z-index: 10;
}

/* Header com estatísticas */
.header {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    animation: slideDown 0.5s ease;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.header h1 {
    color: white;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.stats {
    display: flex;
    gap: 20px;
    color: white;
}

.stat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.15);
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 500;
}

.stat-item i {
    font-size: 1.1rem;
}

/* Card Principal */
.card-container {
    perspective: 2000px;
    margin-bottom: 24px;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.card {
    position: relative;
    width: 100%;
    height: 380px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}

.card.flipped {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 32px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    transition: all 0.3s ease;
}

.card-front {
    background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.card-front h2 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--dark);
    text-align: center;
    line-height: 1.4;
    margin-bottom: 20px;
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card-back {
    background: var(--gradient);
    transform: rotateY(180deg);
    color: white;
    text-align: center;
}

.card-back h3 {
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 20px;
    animation: slideUp 0.5s ease 0.1s both;
}

.card-back small {
    font-size: 1.1rem;
    line-height: 1.6;
    opacity: 0.95;
    max-width: 90%;
    animation: slideUp 0.5s ease 0.2s both;
}

/* Hint/Flip Indicator */
.flip-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.6);
    color: white;
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
    backdrop-filter: blur(5px);
    opacity: 0.7;
    transition: opacity 0.3s ease;
    pointer-events: none;
}

.card:hover .flip-hint {
    opacity: 1;
}

/* Controles Avançados */
.controls-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

.btn {
    padding: 14px;
    border: none;
    border-radius: 18px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    position: relative;
    overflow: hidden;
}

.btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
}

.btn:hover::before {
    width: 300px;
    height: 300px;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    border-color: rgba(255, 255, 255, 0.5);
}

.btn:active {
    transform: translateY(0);
}

.btn-primary {
    background: var(--primary);
}

.btn-success {
    background: var(--success);
}

.btn-warning {
    background: var(--secondary);
}

.btn-danger {
    background: var(--danger);
}

/* Progress Bar Premium */
.progress-section {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 20px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    color: white;
}

.progress-title {
    font-size: 0.95rem;
    opacity: 0.9;
    display: flex;
    align-items: center;
    gap: 6px;
}

.progress-percentage {
    font-weight: 700;
    font-size: 1.2rem;
    color: white;
}

.progress-bar-container {
    width: 100%;
    height: 12px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 16px;
}

.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--secondary), #fbbf24);
    border-radius: 100px;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
}

.progress-bar::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    animation: shimmer 2s infinite;
}

@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

/* Miniaturas dos cards */
.card-thumbnails {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
}

.thumbnail {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.15);
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 0.9rem;
}

.thumbnail:hover {
    transform: scale(1.1);
    background: rgba(255, 255, 255, 0.25);
}

.thumbnail.active {
    border-color: var(--secondary);
    background: var(--secondary);
    color: var(--dark);
    transform: scale(1.05);
}

/* Keyboard Shortcuts Hint */
.shortcuts-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(10px);
    color: white;
    padding: 12px 20px;
    border-radius: 50px;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 16px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    animation: slideInRight 0.5s ease;
    z-index: 100;
}

@keyframes slideInRight {
    from {
        opacity: 0;
        transform: translateX(100px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

.shortcut-key {
    background: rgba(255, 255, 255, 0.2);
    padding: 4px 10px;
    border-radius: 8px;
    font-family: monospace;
    font-weight: 600;
}

/* Loading State */
.loading {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--gradient);
    border-radius: 32px;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.loading-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Toast Notifications */
.toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(10px);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-weight: 500;
    z-index: 1000;
    transition: transform 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.toast.show {
    transform: translateX(-50%) translateY(0);
}

/* Responsive */
@media (max-width: 600px) {
    .header {
        flex-direction: column;
        gap: 12px;
        text-align: center;
    }
    
    .stats {
        width: 100%;
        justify-content: center;
    }
    
    .card {
        height: 320px;
    }
    
    .card-face {
        padding: 24px;
    }
    
    .card-front h2 {
        font-size: 1.5rem;
    }
    
    .card-back h3 {
        font-size: 1.8rem;
    }
    
    .card-back small {
        font-size: 1rem;
    }
    
    .controls-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    
    .shortcuts-hint {
        display: none;
    }
}

/* Touch Optimizations */
@media (hover: none) {
    .btn:hover {
        transform: none;
    }
    
    .btn:active {
        transform: scale(0.95);
    }
}

/* Accessibility */
@media (prefers-reduced-motion: reduce) {
    * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}

/* Focus States */
.btn:focus-visible,
.thumbnail:focus-visible {
    outline: 3px solid var(--secondary);
    outline-offset: 2px;
}
</style>
</head>
<body>

<div class="container">
    <!-- Header com estatísticas -->
    <div class="header">
        <h1>📚 Figuras de Linguagem</h1>
        <div class="stats">
            <div class="stat-item">
                <span>📊</span>
                <span id="studyProgress">0/0</span>
            </div>
            <div class="stat-item">
                <span>⏱️</span>
                <span id="studyTime">00:00</span>
            </div>
        </div>
    </div>

    <!-- Card Principal -->
    <div class="card-container">
        <div class="card" id="mainCard" onclick="flipCard()" role="button" tabindex="0" aria-label="Clique para virar o card">
            <div class="card-face card-front">
                <h2 id="pergunta">Carregando...</h2>
                <div class="flip-hint">
                    <span>🔄</span>
                    <span>Clique para ver a resposta</span>
                </div>
            </div>
            <div class="card-face card-back">
                <h3 id="resposta"></h3>
                <small id="explicacao"></small>
                <div class="flip-hint" style="background: rgba(255,255,255,0.2);">
                    <span>🔄</span>
                    <span>Clique para voltar</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Controles Avançados -->
    <div class="controls-grid">
        <button class="btn" onclick="prevCard()" aria-label="Card anterior">
            <span>◀</span>
            <span class="btn-text">Anterior</span>
        </button>
        <button class="btn" onclick="nextCard()" aria-label="Próximo card">
            <span class="btn-text">Próximo</span>
            <span>▶</span>
        </button>
        <button class="btn btn-warning" onclick="shuffleCards()" aria-label="Modo aleatório">
            <span>🎲</span>
            <span class="btn-text">Aleatório</span>
        </button>
        <button class="btn btn-danger" onclick="resetOrder()" aria-label="Reiniciar ordem">
            <span>🔄</span>
            <span class="btn-text">Reiniciar</span>
        </button>
    </div>

    <!-- Barra de Progresso Premium -->
    <div class="progress-section">
        <div class="progress-header">
            <span class="progress-title">
                <span>📈</span>
                <span>Progresso do Estudo</span>
            </span>
            <span class="progress-percentage" id="progressPercentage">0%</span>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress" style="width: 0%;"></div>
        </div>
        
        <!-- Miniaturas dos Cards -->
        <div class="card-thumbnails" id="thumbnails"></div>
    </div>
</div>

<!-- Dicas de Atalhos -->
<div class="shortcuts-hint">
    <span>⌨️ Atalhos:</span>
    <span class="shortcut-key">←</span>
    <span>Anterior</span>
    <span class="shortcut-key">→</span>
    <span>Próximo</span>
    <span class="shortcut-key">␣</span>
    <span>Virar</span>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script>
let flashcards = [];
let originalCards = [];
let currentIndex = 0;
let studyTime = 0;
let timerInterval;
let isLoading = true;

// Elementos DOM
const cardElement = document.getElementById('mainCard');
const perguntaEl = document.getElementById('pergunta');
const respostaEl = document.getElementById('resposta');
const explicacaoEl = document.getElementById('explicacao');
const progressEl = document.getElementById('progress');
const progressPercentage = document.getElementById('progressPercentage');
const counterEl = document.getElementById('studyProgress');
const thumbnailsEl = document.getElementById('thumbnails');
const toastEl = document.getElementById('toast');
const studyTimeEl = document.getElementById('studyTime');

// Carregar dados
fetch("flashcards.json")
.then(response => response.json())
.then(data => {
    flashcards = data;
    originalCards = [...data];
    isLoading = false;
    loadCard();
    startTimer();
    showToast('✅ Cards carregados com sucesso!');
})
.catch(error => {
    console.error('Erro ao carregar flashcards:', error);
    // Dados de exemplo caso o JSON não seja encontrado
    flashcards = [
        {
            pergunta: "O que é Metáfora?",
            resposta: "Metáfora",
            explicacao: "Figura de linguagem que estabelece uma comparação implícita entre dois elementos."
        },
        {
            pergunta: "O que é Ironia?",
            resposta: "Ironia",
            explicacao: "Figura que apresenta um significado oposto ao que está sendo dito."
        },
        {
            pergunta: "O que é Hipérbole?",
            resposta: "Hipérbole",
            explicacao: "Exagero intencional na expressão para enfatizar uma ideia."
        }
    ];
    originalCards = [...flashcards];
    isLoading = false;
    loadCard();
    startTimer();
});

// Timer de estudo
function startTimer() {
    timerInterval = setInterval(() => {
        studyTime++;
        const minutes = Math.floor(studyTime / 60);
        const seconds = studyTime % 60;
        studyTimeEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }, 1000);
}

// Carregar card
function loadCard() {
    if (isLoading || !flashcards.length) return;
    
    const card = flashcards[currentIndex];
    
    perguntaEl.innerText = card.pergunta;
    respostaEl.innerText = card.resposta;
    explicacaoEl.innerText = card.explicacao;
    
    cardElement.classList.remove('flipped');
    
    updateProgress();
    updateThumbnails();
    updateStudyStats();
    
    // Animação de entrada
    perguntaEl.style.animation = 'none';
    perguntaEl.offsetHeight;
    perguntaEl.style.animation = 'slideUp 0.5s ease';
}

// Atualizar miniaturas
function updateThumbnails() {
    thumbnailsEl.innerHTML = '';
    flashcards.forEach((_, index) => {
        const thumb = document.createElement('div');
        thumb.className = `thumbnail ${index === currentIndex ? 'active' : ''}`;
        thumb.textContent = index + 1;
        thumb.setAttribute('data-index', index);
        thumb.setAttribute('tabindex', '0');
        thumb.setAttribute('role', 'button');
        thumb.setAttribute('aria-label', `Ir para card ${index + 1}`);
        
        thumb.addEventListener('click', (e) => {
            e.stopPropagation();
            currentIndex = index;
            loadCard();
        });
        
        thumb.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                currentIndex = index;
                loadCard();
            }
        });
        
        thumbnailsEl.appendChild(thumb);
    });
}

// Atualizar estatísticas
function updateStudyStats() {
    counterEl.textContent = `${currentIndex + 1}/${flashcards.length}`;
    
    const progressValue = ((currentIndex + 1) / flashcards.length) * 100;
    progressEl.style.width = `${progressValue}%`;
    progressPercentage.textContent = `${Math.round(progressValue)}%`;
}

// Funções de navegação
function flipCard() {
    if (isLoading) return;
    cardElement.classList.toggle('flipped');
}

function nextCard() {
    if (isLoading) return;
    if (currentIndex < flashcards.length - 1) {
        currentIndex++;
        loadCard();
        showToast(`📖 Card ${currentIndex + 1} de ${flashcards.length}`);
    } else {
        showToast('🎉 Você chegou ao final!', 2000);
    }
}

function prevCard() {
    if (isLoading) return;
    if (currentIndex > 0) {
        currentIndex--;
        loadCard();
        showToast(`📖 Card ${currentIndex + 1} de ${flashcards.length}`);
    }
}

function shuffleCards() {
    if (isLoading) return;
    
    for (let i = flashcards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [flashcards[i], flashcards[j]] = [flashcards[j], flashcards[i]];
    }
    currentIndex = 0;
    loadCard();
    showToast('🎲 Modo aleatório ativado!');
}

function resetOrder() {
    if (isLoading) return;
    
    flashcards = [...originalCards];
    currentIndex = 0;
    loadCard();
    showToast('🔄 Ordem original restaurada!');
}

// Toast notification
function showToast(message, duration = 3000) {
    toastEl.textContent = message;
    toastEl.classList.add('show');
    
    setTimeout(() => {
        toastEl.classList.remove('show');
    }, duration);
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
    if (isLoading) return;
    
    switch(e.key) {
        case 'ArrowLeft':
            e.preventDefault();
            prevCard();
            break;
        case 'ArrowRight':
            e.preventDefault();
            nextCard();
            break;
        case ' ':
            e.preventDefault();
            flipCard();
            break;
    }
});

// Touch gestures
let touchStartX = 0;
let touchEndX = 0;

cardElement.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
});

cardElement.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
});

function handleSwipe() {
    const swipeThreshold = 50;
    const diff = touchStartX - touchEndX;
    
    if (Math.abs(diff) > swipeThreshold) {
        if (diff > 0) {
            nextCard();
        } else {
            prevCard();
        }
    }
}

// Cleanup timer on page unload
window.addEventListener('beforeunload', () => {
    if (timerInterval) {
        clearInterval(timerInterval);
    }
});

// Atualizar função de progresso (mantida para compatibilidade)
function updateProgress() {
    // Agora é tratado por updateStudyStats
}
</script>
</body>
</html>
